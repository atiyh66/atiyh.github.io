<!DOCTYPE html>
<html>
<head>
  <title>سؤال مهم 😏</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
      background-color: #f5f5f5;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
    }
    .yes {
      background-color: #4CAF50;
      color: white;
    }
    .no {
      background-color: #f44336;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

<h1>تجي معي القهوة بكرة؟ ☕</h1>

<button class="yes" onclick="yes()">أكيد </button>
<button class="no" onmouseover="move(this)">لا </button>

<script>
function yes() {
  alert("تم! خلاص اتفقنا ");
}

function move(btn) {
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
